version: "3.8"

services:
  spark:
    image: thailinh2003/spark:3.0.0
    container_name: spark
    command: >
      bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark &
      sleep 5 &&
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
      "
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - spark-net

  livy:
    image: thailinh2003/livy:2.0.0
    container_name: livy
    depends_on:
      - spark
    ports:
      - "8998:8998"
    volumes:
      - ./livy/livy.conf:/opt/livy/conf/livy.conf
      - ./simple-spark-job/target/simple-spark-job-1.0-SNAPSHOT.jar:/tmp/simple-spark-job-1.0-SNAPSHOT.jar
    networks:
      - spark-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
    networks:
      - spark-net

networks:
  spark-net:
